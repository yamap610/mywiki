<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📖 M.Y 小百科</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --milk: #fdf8f3;
  --cream: #f5ece0;
  --latte: #e8d5bc;
  --moon: #c9a97a;
  --moon2: #a07848;
  --moon-light: #fdf0dc;
  --moon-soft: #f7e8c8;
  --brown: #8b6343;
  --deep: #5c3d1e;
  --text: #3d2b1a;
  --muted: #a08060;
  --white: #fffefb;
  --shadow: rgba(139,99,67,0.12);
  --shadow-md: rgba(139,99,67,0.18);
  --radius: 16px;
  --radius-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--milk);
  color: var(--text);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── HEADER ── */
.app-header {
  background: linear-gradient(135deg, var(--deep) 0%, var(--brown) 60%, var(--moon2) 100%);
  padding: 20px 16px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px var(--shadow-md);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.app-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--white);
  display: flex;
  align-items: center;
  gap: 8px;
}
.app-title .emoji { font-size: 1.5rem; }
.app-subtitle {
  font-size: 0.72rem;
  color: var(--moon-light);
  opacity: 0.85;
  letter-spacing: 0.05em;
}
.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}
.icon-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 10px;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--white);
  font-size: 1rem;
  transition: background 0.2s;
  backdrop-filter: blur(4px);
}
.icon-btn:hover { background: rgba(255,255,255,0.25); }

/* Search bar */
.search-bar {
  display: flex;
  gap: 8px;
}
.search-input {
  flex: 1;
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 12px;
  padding: 9px 14px 9px 36px;
  color: var(--white);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 0.88rem;
  outline: none;
  backdrop-filter: blur(4px);
  transition: background 0.2s;
  position: relative;
}
.search-input::placeholder { color: rgba(255,255,255,0.6); }
.search-input:focus { background: rgba(255,255,255,0.28); }
.search-wrap {
  position: relative;
  flex: 1;
}
.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.7);
  font-size: 0.9rem;
  pointer-events: none;
}

/* ── FILTER BAR ── */
.filter-bar {
  background: var(--white);
  border-bottom: 1px solid var(--latte);
  padding: 10px 12px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  align-items: center;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  background: var(--cream);
  border: 1.5px solid var(--latte);
  border-radius: 20px;
  padding: 5px 13px;
  font-size: 0.8rem;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  color: var(--brown);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}
.filter-chip.active {
  background: var(--moon);
  border-color: var(--moon);
  color: var(--white);
  font-weight: 500;
}
.filter-chip:hover:not(.active) {
  background: var(--moon-soft);
  border-color: var(--moon);
}
.filter-divider {
  width: 1px;
  height: 20px;
  background: var(--latte);
  flex-shrink: 0;
}

/* View toggle */
.view-toggle {
  display: flex;
  gap: 0;
  background: var(--cream);
  border: 1.5px solid var(--latte);
  border-radius: 8px;
  overflow: hidden;
  margin-left: auto;
  flex-shrink: 0;
}
.view-btn {
  padding: 5px 10px;
  font-size: 0.85rem;
  cursor: pointer;
  background: transparent;
  border: none;
  color: var(--muted);
  transition: all 0.2s;
}
.view-btn.active { background: var(--moon); color: var(--white); }

/* ── MAIN CONTENT ── */
.main {
  padding: 14px 12px;
}

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.stat-pill {
  background: var(--white);
  border: 1px solid var(--latte);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 0.78rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
}
.stat-pill strong { color: var(--moon2); }

/* ── GRID VIEW ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
@media (min-width: 480px) {
  .cards-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ── LIST VIEW ── */
.cards-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── CARD ── */
.card {
  background: var(--white);
  border: 1px solid var(--latte);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s;
  position: relative;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow-md); }
.card:active { transform: scale(0.98); }

/* Grid card */
.card-grid .card-thumb {
  width: 100%;
  aspect-ratio: 4/3;
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.2rem;
  position: relative;
  overflow: hidden;
}
.card-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.card-thumb .thumb-placeholder { 
  font-size: 2.5rem;
  opacity: 0.5;
}
.card-thumb-url {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(transparent, rgba(61,43,26,0.6));
  padding: 12px 8px 4px;
}
.card-body {
  padding: 10px;
}
.card-cat {
  font-size: 0.7rem;
  color: var(--moon2);
  font-weight: 500;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 3px;
}
.card-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 5px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-note {
  font-size: 0.75rem;
  color: var(--muted);
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-url-chip {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 0.68rem;
  color: var(--moon2);
  background: var(--moon-light);
  border-radius: 6px;
  padding: 2px 6px;
  margin-top: 5px;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* List card */
.card-list {
  display: flex;
  gap: 12px;
  padding: 12px;
  align-items: flex-start;
}
.card-list .card-thumb-sm {
  width: 58px;
  height: 58px;
  min-width: 58px;
  border-radius: 10px;
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  overflow: hidden;
  flex-shrink: 0;
}
.card-list .card-thumb-sm img { width: 100%; height: 100%; object-fit: cover; }
.card-list .card-info { flex: 1; min-width: 0; }
.card-list .card-title { font-size: 0.9rem; -webkit-line-clamp: 1; }
.card-list .card-note { -webkit-line-clamp: 1; }
.card-date {
  font-size: 0.68rem;
  color: var(--muted);
  margin-top: 4px;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 48px 24px;
}
.empty-icon { font-size: 3.5rem; margin-bottom: 12px; opacity: 0.5; }
.empty-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 1rem;
  color: var(--muted);
  margin-bottom: 6px;
}
.empty-sub { font-size: 0.82rem; color: var(--muted); opacity: 0.7; }

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: 24px;
  right: 20px;
  width: 54px;
  height: 54px;
  background: linear-gradient(135deg, var(--moon) 0%, var(--moon2) 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(169,120,72,0.45);
  transition: transform 0.2s, box-shadow 0.2s;
  border: none;
  color: white;
  z-index: 200;
}
.fab:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(169,120,72,0.55); }
.fab:active { transform: scale(0.96); }

/* ── MODALS ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(61,43,26,0.45);
  z-index: 300;
  display: none;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(3px);
}
.overlay.active { display: flex; }
.overlay.center-modal { align-items: center; }

.modal {
  background: var(--white);
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 540px;
  max-height: 92vh;
  overflow-y: auto;
  animation: slideUp 0.28s cubic-bezier(0.34,1.56,0.64,1);
  scrollbar-width: none;
}
.modal::-webkit-scrollbar { display: none; }

.modal.small-modal {
  border-radius: 20px;
  max-width: 360px;
  animation: popIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
  margin: 16px;
}

@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes popIn {
  from { transform: scale(0.85); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 18px 12px;
  border-bottom: 1px solid var(--latte);
  position: sticky;
  top: 0;
  background: var(--white);
  z-index: 1;
}
.modal-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--deep);
}
.modal-close {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--cream);
  border: none;
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
}
.modal-close:hover { background: var(--latte); }

.modal-body { padding: 16px 18px 24px; }

/* ── FORM ── */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--brown);
  margin-bottom: 5px;
}
.form-label .req { color: var(--moon2); }
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--cream);
  border: 1.5px solid var(--latte);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 0.88rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--moon);
  background: var(--milk);
}
.form-textarea { resize: vertical; min-height: 90px; }
.form-hint { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

/* URL preview */
.url-preview {
  border: 1.5px dashed var(--latte);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  margin-top: 6px;
  display: none;
  align-items: center;
  gap: 10px;
  background: var(--moon-light);
}
.url-preview.visible { display: flex; }
.url-preview-icon { font-size: 1.5rem; flex-shrink: 0; }
.url-preview-info { flex: 1; min-width: 0; }
.url-preview-title { font-size: 0.82rem; font-weight: 500; color: var(--text); }
.url-preview-domain { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

/* Category picker */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 4px;
}
.cat-option {
  border: 1.5px solid var(--latte);
  border-radius: 10px;
  padding: 8px 6px;
  text-align: center;
  cursor: pointer;
  background: var(--cream);
  transition: all 0.18s;
}
.cat-option.selected {
  border-color: var(--moon);
  background: var(--moon-light);
}
.cat-option:hover:not(.selected) { border-color: var(--moon); background: var(--moon-soft); }
.cat-emoji { font-size: 1.3rem; display: block; }
.cat-name {
  font-size: 0.7rem;
  color: var(--brown);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cat-option.selected .cat-name { color: var(--moon2); font-weight: 500; }

/* Image upload */
.img-upload-area {
  border: 2px dashed var(--latte);
  border-radius: var(--radius-sm);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--cream);
}
.img-upload-area:hover { border-color: var(--moon); background: var(--moon-soft); }
.img-upload-area .upload-icon { font-size: 2rem; opacity: 0.5; margin-bottom: 6px; }
.img-upload-area p { font-size: 0.78rem; color: var(--muted); }
.img-preview-wrap { position: relative; display: inline-block; }
.img-preview { 
  width: 100%;
  max-height: 160px;
  object-fit: cover;
  border-radius: 8px;
  display: block;
}
.img-remove {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 24px;
  height: 24px;
  background: rgba(92,61,30,0.7);
  border-radius: 50%;
  border: none;
  color: white;
  font-size: 0.85rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Buttons */
.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 18px;
}
.btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--moon) 0%, var(--moon2) 100%);
  color: white;
  box-shadow: 0 3px 10px rgba(169,120,72,0.35);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(169,120,72,0.4); }
.btn-secondary {
  background: var(--cream);
  color: var(--brown);
  border: 1.5px solid var(--latte);
}
.btn-danger { background: #ffe8e5; color: #c0392b; border: 1.5px solid #f5c6c2; }

/* ── DETAIL MODAL ── */
.detail-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4rem;
  overflow: hidden;
  border-radius: 16px 16px 0 0;
}
.detail-thumb img { width: 100%; height: 100%; object-fit: cover; }
.detail-cat-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.detail-cat-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.78rem;
  color: var(--moon2);
  background: var(--moon-light);
  border-radius: 20px;
  padding: 3px 10px;
  font-weight: 500;
}
.detail-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--deep);
  margin-bottom: 10px;
  line-height: 1.45;
}
.detail-note {
  font-size: 0.88rem;
  color: var(--text);
  line-height: 1.7;
  white-space: pre-wrap;
  margin-bottom: 14px;
}
.detail-url-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--moon-light);
  border: 1.5px solid var(--latte);
  border-radius: 12px;
  padding: 10px 14px;
  color: var(--moon2);
  font-size: 0.85rem;
  text-decoration: none;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  cursor: pointer;
  margin-bottom: 14px;
  transition: all 0.18s;
  word-break: break-all;
}
.detail-url-btn:hover { background: var(--moon-soft); }
.detail-meta {
  font-size: 0.72rem;
  color: var(--muted);
  border-top: 1px solid var(--latte);
  padding-top: 10px;
  margin-top: 4px;
}
.detail-actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}

/* ── SETTINGS ── */
.settings-section { margin-bottom: 20px; }
.settings-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--deep);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.setting-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 14px;
  background: var(--cream);
  border: 1px solid var(--latte);
  border-radius: 10px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: background 0.18s;
}
.setting-item:hover { background: var(--moon-soft); }
.setting-label { font-size: 0.85rem; color: var(--text); }
.setting-arrow { color: var(--muted); font-size: 0.85rem; }

/* Category management */
.cat-edit-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--cream);
  border: 1px solid var(--latte);
  border-radius: 10px;
  margin-bottom: 6px;
}
.cat-edit-emoji { font-size: 1.3rem; cursor: pointer; min-width: 32px; text-align: center; }
.cat-edit-name { flex: 1; font-size: 0.88rem; color: var(--text); }
.cat-edit-del {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 1rem;
  padding: 2px 6px;
  border-radius: 6px;
  transition: all 0.18s;
}
.cat-edit-del:hover { background: #ffe8e5; color: #c0392b; }

/* Login screen */
.login-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  text-align: center;
  background: linear-gradient(160deg, var(--milk) 0%, var(--cream) 100%);
}
.login-icon { font-size: 4rem; margin-bottom: 16px; }
.login-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--deep);
  margin-bottom: 6px;
}
.login-sub { font-size: 0.88rem; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }
.login-card {
  background: var(--white);
  border: 1px solid var(--latte);
  border-radius: 20px;
  padding: 24px;
  width: 100%;
  max-width: 320px;
  box-shadow: 0 4px 24px var(--shadow);
}
.login-card .form-label { text-align: left; }
.login-card .btn { width: 100%; margin-top: 14px; }

/* Toast */
.toast-wrap {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 500;
  pointer-events: none;
}
.toast {
  background: var(--deep);
  color: var(--white);
  padding: 10px 18px;
  border-radius: 24px;
  font-size: 0.84rem;
  animation: toastIn 0.25s ease, toastOut 0.3s ease 2s forwards;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(92,61,30,0.3);
}
@keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* Loading */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px;
  color: var(--muted);
  font-size: 0.9rem;
  gap: 8px;
}
.spinner {
  width: 20px;
  height: 20px;
  border: 2px solid var(--latte);
  border-top-color: var(--moon);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Confirm modal */
.confirm-body { padding: 20px 18px 22px; text-align: center; }
.confirm-icon { font-size: 2.5rem; margin-bottom: 10px; }
.confirm-title { font-family: 'Noto Serif TC', serif; font-size: 1rem; font-weight: 600; color: var(--deep); margin-bottom: 6px; }
.confirm-msg { font-size: 0.84rem; color: var(--muted); margin-bottom: 18px; line-height: 1.6; }

/* Export/Import */
.io-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 16px;
  border: 1.5px solid var(--latte);
  border-radius: 12px;
  background: var(--cream);
  color: var(--text);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 0.9rem;
  cursor: pointer;
  width: 100%;
  margin-bottom: 8px;
  transition: all 0.2s;
  text-align: left;
}
.io-btn:hover { background: var(--moon-soft); border-color: var(--moon); }
.io-btn-icon { font-size: 1.2rem; }
.io-btn-text .io-label { font-weight: 500; }
.io-btn-text .io-sub { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

/* Add cat inline */
.add-cat-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.add-cat-row .form-input { flex: 1; }
.add-cat-emoji-inp { width: 52px !important; text-align: center; font-size: 1.1rem; }

/* No results */
.no-results { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 0.88rem; }

/* Highlight search */
mark { background: var(--moon-soft); color: var(--deep); border-radius: 3px; padding: 0 2px; }

/* Floating room code badge */
.room-badge {
  position: fixed;
  bottom: 92px;
  left: 16px;
  background: var(--white);
  border: 1px solid var(--latte);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 0.72rem;
  color: var(--muted);
  z-index: 150;
  box-shadow: 0 2px 8px var(--shadow);
  display: flex;
  align-items: center;
  gap: 5px;
}

</style>
</head>
<body>

<!-- ══ ADD/EDIT MODAL ══ -->
<div class="overlay" id="addOverlay" onclick="closeOverlay(this,'addModal')">
  <div class="modal" id="addModal" onclick="e=>e.stopPropagation()">
    <div class="modal-header">

<!-- ══ DETAIL MODAL ══ -->
<div class="overlay" id="detailOverlay" onclick="closeOverlay(this,'detailModal')">

<div class="overlay" id="settingsOverlay" onclick="closeOverlay(this,'settingsModal')">
  <div class="modal" id="settingsModal" onclick="e=>e.stopPropagation()">

      <div class="modal-title">⚙️ 設定</div>

<!-- ══ IO MODAL ══ -->
<div class="overlay" id="ioOverlay" onclick="closeOverlay(this,'ioModal')">

    </div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { 
  getFirestore, collection, doc, setDoc, deleteDoc,
  onSnapshot, serverTimestamp, query, orderBy
} from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

// ── FIREBASE CONFIG ──
const firebaseConfig = {
  apiKey: "AIzaSyAy0QKDrORa_VSecvEbeUxjMkRU4jd-QEM",
  authDomain: "five-year-diary-d7e00.firebaseapp.com",
  projectId: "five-year-diary-d7e00",
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ── STATE ──
let roomCode = '';
let entries = [];    // [{id, title, cat, url, imgUrl, imgData, note, createdAt}]
let categories = []; // [{id, emoji, name}]
let currentView = 'grid';
let currentCat = 'all';
let searchQ = '';
let editingId = null;
let deletingId = null;
let selectedCatId = null;
let imgBase64 = null;
let unsubEntries = null;
let unsubMeta = null;

// ── DEFAULT CATEGORIES ──
const DEFAULT_CATS = [
  { id: 'parenting', emoji: '👶', name: '育兒知識' },
  { id: 'travel',    emoji: '✈️', name: '旅遊筆記' },
  { id: 'tools',     emoji: '🔧', name: '工具連結' },
  { id: 'manuals',   emoji: '📋', name: '說明書' },
  { id: 'recipes',   emoji: '🍳', name: '食譜料理' },
  { id: 'shopping',  emoji: '🛍', name: '好物推薦' },
];

// ── EXPOSE TO GLOBAL ──
window.doLogin = doLogin;
window.openAddModal = openAddModal;
window.closeAddModal = closeAddModal;
window.closeOverlay = closeOverlay;
window.onSearch = onSearch;
window.setCatFilter = setCatFilter;
window.setView = setView;
window.saveEntry = saveEntry;
window.editEntry = editEntry;
window.confirmDelete = confirmDelete;
window.doDelete = doDelete;
window.closeConfirm = closeConfirm;
window.closeDetailModal = closeDetailModal;
window.openSettings = openSettings;
window.closeSettings = closeSettings;
window.addCategory = addCategory;
window.changeRoom = changeRoom;
window.openIo = openIo;
window.closeIo = closeIo;
window.exportJson = exportJson;
window.exportCsv = exportCsv;
window.importJson = importJson;
window.removeImg = removeImg;
window.onImgFile = onImgFile;
window.onImgUrlInput = onImgUrlInput;
window.onUrlInput = onUrlInput;
window.fetchUrlPreview = fetchUrlPreview;

// ── INIT ──
function init() {
  // Check URL param or localStorage
  const params = new URLSearchParams(location.search);
  const codeFromUrl = params.get('code');
  const codeFromStorage = localStorage.getItem('dash_last_room');
  const code = codeFromUrl || codeFromStorage;
  if (code) {
    startApp(code.toLowerCase().trim());
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
  }
}

function doLogin() {
  const code = document.getElementById('loginCode').value.trim().toLowerCase();
  if (!code) { showToast('請輸入家庭代號'); return; }
  startApp(code);
}

function startApp(code) {
  roomCode = code;
  localStorage.setItem('dash_last_room', code);
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('roomCodeDisplay').textContent = code;
  subscribeData();
}

// ── FIRESTORE SUBSCRIBE ──
function subscribeData() {
  const metaRef = doc(db, 'vault_meta_v1', roomCode);
  const entriesRef = query(
    collection(db, `vault_v1/${roomCode}/entries`),
    orderBy('createdAt', 'desc')
  );

  // Meta (categories)
  unsubMeta = onSnapshot(metaRef, snap => {
    if (snap.exists()) {
      const data = snap.data();
      categories = data.categories || DEFAULT_CATS;
    } else {
      categories = [...DEFAULT_CATS];
    }
    renderFilterChips();
    renderCatGrid();
    renderCatEditList();
  });

  // Entries
  unsubEntries = onSnapshot(entriesRef, snap => {
    entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderCards();
    renderStats();
  });
}

// ── SAVE META ──
async function saveMeta() {
  const metaRef = doc(db, 'vault_meta_v1', roomCode);
  await setDoc(metaRef, { categories }, { merge: true });
}

// ── RENDER FILTER CHIPS ──
function renderFilterChips() {
  const bar = document.getElementById('filterBar');
  // Remove old dynamic chips
  bar.querySelectorAll('.filter-chip').forEach(c => c.remove());
  
  const allChip = document.createElement('button');
  allChip.className = 'filter-chip' + (currentCat === 'all' ? ' active' : '');
  allChip.textContent = '全部';
  allChip.setAttribute('data-cat', 'all');
  allChip.onclick = () => setCatFilter('all');
  bar.appendChild(allChip);

  categories.forEach(cat => {
    const ch = document.createElement('button');
    ch.className = 'filter-chip' + (currentCat === cat.id ? ' active' : '');
    ch.textContent = cat.emoji + ' ' + cat.name;
    ch.setAttribute('data-cat', cat.id);
    ch.onclick = () => setCatFilter(cat.id);
    bar.appendChild(ch);
  });
}

// ── RENDER CAT GRID (in form) ──
function renderCatGrid() {
  const grid = document.getElementById('catGrid');
  if (!grid) return;
  grid.innerHTML = '';
  categories.forEach(cat => {
    const div = document.createElement('div');
    div.className = 'cat-option' + (selectedCatId === cat.id ? ' selected' : '');
    div.innerHTML = `<span class="cat-emoji">${cat.emoji}</span><div class="cat-name">${cat.name}</div>`;
    div.onclick = () => { selectedCatId = cat.id; renderCatGrid(); };
    grid.appendChild(div);
  });
}

// ── RENDER CAT EDIT LIST ──
function renderCatEditList() {
  const list = document.getElementById('catEditList');
  if (!list) return;
  list.innerHTML = '';
  categories.forEach((cat, i) => {
    const div = document.createElement('div');
    div.className = 'cat-edit-item';
    div.innerHTML = `
      <span class="cat-edit-emoji" title="點擊更換Emoji" onclick="promptCatEmoji(${i})">${cat.emoji}</span>
      <span class="cat-edit-name">${cat.name}</span>
      <button class="cat-edit-del" onclick="deleteCategory(${i})" title="刪除">🗑</button>
    `;
    list.appendChild(div);
  });
}
window.promptCatEmoji = function(i) {
  const e = prompt('輸入新 Emoji：', categories[i].emoji);
  if (e && e.trim()) {
    categories[i].emoji = e.trim();
    saveMeta();
    renderCatEditList();
    renderFilterChips();
  }
};
window.deleteCategory = async function(i) {
  if (!confirm(`確定刪除「${categories[i].name}」分類？`)) return;
  categories.splice(i, 1);
  await saveMeta();
  renderCatEditList();
  renderFilterChips();
};

// ── FILTER / SEARCH ──
function getFiltered() {
  let list = [...entries];
  if (currentCat !== 'all') list = list.filter(e => e.cat === currentCat);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(e =>
      (e.title || '').toLowerCase().includes(q) ||
      (e.note || '').toLowerCase().includes(q) ||
      (e.url || '').toLowerCase().includes(q)
    );
  }
  return list;
}

function onSearch() {
  searchQ = document.getElementById('searchInput').value;
  renderCards();
}

function setCatFilter(catId) {
  currentCat = catId;
  document.querySelectorAll('.filter-chip').forEach(c => {
    c.classList.toggle('active', c.getAttribute('data-cat') === catId);
  });
  renderCards();
}

function setView(v) {
  currentView = v;
  document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
  document.getElementById('btnList').classList.toggle('active', v === 'list');
  renderCards();
}

// ── RENDER STATS ──
function renderStats() {
  const sb = document.getElementById('statsBar');
  sb.innerHTML = `
    <div class="stat-pill">共 <strong>${entries.length}</strong> 筆</div>
    ${categories.map(c => {
      const cnt = entries.filter(e => e.cat === c.id).length;
      return cnt > 0 ? `<div class="stat-pill">${c.emoji}<strong>${cnt}</strong></div>` : '';
    }).join('')}
  `;
  // settings stats
  const sd = document.getElementById('statsDetail');
  if (sd) {
    sd.innerHTML = categories.map(c => {
      const cnt = entries.filter(e => e.cat === c.id).length;
      return `${c.emoji} ${c.name}：<strong style="color:var(--moon2)">${cnt}</strong> 筆<br>`;
    }).join('') + `<br>總計：<strong style="color:var(--moon2)">${entries.length}</strong> 筆`;
  }
}

// ── RENDER CARDS ──
function renderCards() {
  const container = document.getElementById('cardsContainer');
  const list = getFiltered();

  if (entries.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📖</div>
        <div class="empty-title">還沒有任何收藏</div>
        <div class="empty-sub">點下方 ＋ 按鈕開始新增吧！</div>
      </div>`;
    return;
  }
  if (list.length === 0) {
    container.innerHTML = `<div class="no-results">😕 找不到符合的收藏</div>`;
    return;
  }

  const hl = (text) => {
    if (!searchQ || !text) return text || '';
    const re = new RegExp(`(${searchQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return text.replace(re, '<mark>$1</mark>');
  };

  if (currentView === 'grid') {
    container.className = 'cards-grid';
    container.innerHTML = list.map(e => {
      const cat = categories.find(c => c.id === e.cat);
      const thumb = e.imgData || e.imgUrl;
      const domain = e.url ? tryGetDomain(e.url) : '';
      return `
        <div class="card card-grid" onclick="openDetail('${e.id}')">
          <div class="card-thumb">
            ${thumb
              ? `<img src="${thumb}" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'"><div class="thumb-placeholder" style="display:none">${cat ? cat.emoji : '📄'}</div>`
              : `<span class="thumb-placeholder">${cat ? cat.emoji : '📄'}</span>`}
          </div>
          <div class="card-body">
            <div class="card-cat">${cat ? cat.emoji + ' ' + cat.name : ''}</div>
            <div class="card-title">${hl(e.title)}</div>
            ${e.note ? `<div class="card-note">${hl(e.note)}</div>` : ''}
            ${domain ? `<div class="card-url-chip">🔗 ${domain}</div>` : ''}
          </div>
        </div>`;
    }).join('');
  } else {
    container.className = 'cards-list';
    container.innerHTML = list.map(e => {
      const cat = categories.find(c => c.id === e.cat);
      const thumb = e.imgData || e.imgUrl;
      const dateStr = e.createdAt ? new Date(e.createdAt.toDate()).toLocaleDateString('zh-TW') : '';
      return `
        <div class="card card-list" onclick="openDetail('${e.id}')">
          <div class="card-thumb-sm">
            ${thumb
              ? `<img src="${thumb}" alt="" onerror="this.style.display='none'; this.parentElement.textContent='${cat ? cat.emoji : '📄'}'"><span style="display:none"></span>`
              : (cat ? cat.emoji : '📄')}
          </div>
          <div class="card-info">
            <div class="card-cat">${cat ? cat.emoji + ' ' + cat.name : ''}</div>
            <div class="card-title">${hl(e.title)}</div>
            ${e.note ? `<div class="card-note">${hl(e.note)}</div>` : ''}
            <div class="card-date">${dateStr}</div>
          </div>
        </div>`;
    }).join('');
  }
}

function tryGetDomain(url) {
  try { return new URL(url).hostname.replace('www.', ''); } catch { return ''; }
}

// ── ADD / EDIT MODAL ──
function openAddModal(idToEdit = null) {
  editingId = idToEdit;
  imgBase64 = null;
  document.getElementById('fTitle').value = '';
  document.getElementById('fUrl').value = '';
  document.getElementById('fNote').value = '';
  document.getElementById('fImgUrl').value = '';
  document.getElementById('imgPreviewWrap').style.display = 'none';
  document.getElementById('imgUploadArea').style.display = 'block';
  document.getElementById('urlPreview').classList.remove('visible');
  selectedCatId = null;

  if (idToEdit) {
    const e = entries.find(x => x.id === idToEdit);
    if (e) {
      document.getElementById('addModalTitle').textContent = '✏️ 編輯收藏';
      document.getElementById('fTitle').value = e.title || '';
      document.getElementById('fUrl').value = e.url || '';
      document.getElementById('fNote').value = e.note || '';
      selectedCatId = e.cat || null;
      if (e.imgData) {
        imgBase64 = e.imgData;
        showImgPreview(e.imgData);
      } else if (e.imgUrl) {
        document.getElementById('fImgUrl').value = e.imgUrl;
        showImgPreview(e.imgUrl);
      }
      if (e.url) { setTimeout(fetchUrlPreview, 100); }
    }
  } else {
    document.getElementById('addModalTitle').textContent = '📝 新增收藏';
  }

  renderCatGrid();
  document.getElementById('addOverlay').classList.add('active');
  document.getElementById('fTitle').focus();
}

function closeAddModal() {
  document.getElementById('addOverlay').classList.remove('active');
  editingId = null;
}

function closeOverlay(overlay, modalId) {
  if (event && event.target === overlay) {
    overlay.classList.remove('active');
  }
}

// ── URL PREVIEW ──
function onUrlInput() {
  const url = document.getElementById('fUrl').value.trim();
  if (!url) document.getElementById('urlPreview').classList.remove('visible');
}

function fetchUrlPreview() {
  const url = document.getElementById('fUrl').value.trim();
  if (!url) return;
  try {
    const domain = new URL(url).hostname.replace('www.', '');
    document.getElementById('urlPreviewTitle').textContent = domain;
    document.getElementById('urlPreviewDomain').textContent = url.length > 50 ? url.substring(0,50)+'…' : url;
    document.getElementById('urlPreviewIcon').textContent = '🔗';
    document.getElementById('urlPreview').classList.add('visible');
  } catch {}
}

// ── IMAGE HANDLING ──
function onImgFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    imgBase64 = e.target.result;
    showImgPreview(imgBase64);
  };
  reader.readAsDataURL(file);
}

function onImgUrlInput() {
  const url = document.getElementById('fImgUrl').value.trim();
  if (url) { showImgPreview(url); imgBase64 = null; }
}

function showImgPreview(src) {
  document.getElementById('imgPreview').src = src;
  document.getElementById('imgPreviewWrap').style.display = 'block';
  document.getElementById('imgUploadArea').style.display = 'none';
}

function removeImg() {
  imgBase64 = null;
  document.getElementById('fImgUrl').value = '';
  document.getElementById('imgPreviewWrap').style.display = 'none';
  document.getElementById('imgUploadArea').style.display = 'block';
  document.getElementById('imgFileInput').value = '';
}

// ── SAVE ENTRY ──
async function saveEntry() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { showToast('請填寫標題'); return; }

  const imgUrl = document.getElementById('fImgUrl').value.trim();
  const data = {
    title,
    cat: selectedCatId || null,
    url: document.getElementById('fUrl').value.trim() || null,
    note: document.getElementById('fNote').value.trim() || null,
    imgData: imgBase64 || null,
    imgUrl: !imgBase64 ? (imgUrl || null) : null,
    updatedAt: serverTimestamp(),
  };

  if (editingId) {
    const ref = doc(db, `vault_v1/${roomCode}/entries`, editingId);
    await setDoc(ref, data, { merge: true });
    showToast('✅ 已更新');
  } else {
    data.createdAt = serverTimestamp();
    const id = 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
    const ref = doc(db, `vault_v1/${roomCode}/entries`, id);
    await setDoc(ref, data);
    showToast('✅ 已新增');
  }
  closeAddModal();
}

// ── DETAIL MODAL ──
function openDetail(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  deletingId = id;
  editingId = id;

  const cat = categories.find(c => c.id === e.cat);
  const thumb = e.imgData || e.imgUrl;

  // Thumb
  const dt = document.getElementById('detailThumb');
  if (thumb) {
    dt.innerHTML = `<img src="${thumb}" alt="" style="width:100%;height:100%;object-fit:cover;">`;
    dt.style.display = 'flex';
  } else {
    dt.innerHTML = `<span style="font-size:5rem;opacity:0.35">${cat ? cat.emoji : '📄'}</span>`;
    dt.style.display = 'flex';
    dt.style.background = 'var(--cream)';
  }

  // Cat badge
  const dcr = document.getElementById('detailCatRow');
  dcr.innerHTML = cat ? `<span class="detail-cat-badge">${cat.emoji} ${cat.name}</span>` : '';

  document.getElementById('detailTitle').textContent = e.title || '';
  document.getElementById('detailNote').textContent = e.note || '';
  document.getElementById('detailNote').style.display = e.note ? 'block' : 'none';

  const urlBtn = document.getElementById('detailUrlBtn');
  if (e.url) {
    urlBtn.href = e.url;
    document.getElementById('detailUrlText').textContent = tryGetDomain(e.url) || e.url;
    urlBtn.style.display = 'flex';
  } else {
    urlBtn.style.display = 'none';
  }

  const dateStr = e.createdAt ? new Date(e.createdAt.toDate()).toLocaleString('zh-TW') : '';
  document.getElementById('detailMeta').textContent = dateStr ? `新增於 ${dateStr}` : '';

  document.getElementById('detailOverlay').classList.add('active');
}

function closeDetailModal() {
  document.getElementById('detailOverlay').classList.remove('active');
}

function editEntry() {
  closeDetailModal();
  setTimeout(() => openAddModal(editingId), 100);
}

// ── DELETE ──
function confirmDelete() {
  document.getElementById('confirmOverlay').classList.add('active');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('active');
}

async function doDelete() {
  if (!deletingId) return;
  const ref = doc(db, `vault_v1/${roomCode}/entries`, deletingId);
  await deleteDoc(ref);
  closeConfirm();
  closeDetailModal();
  showToast('🗑 已刪除');
  deletingId = null;
}

// ── SETTINGS ──
function openSettings() {
  document.getElementById('settingRoom').textContent = roomCode;
  renderCatEditList();
  renderStats();
  document.getElementById('settingsOverlay').classList.add('active');
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('active');
}

function changeRoom() {
  const newCode = prompt('輸入新的家庭代號：', roomCode);
  if (newCode && newCode.trim()) {
    startApp(newCode.trim().toLowerCase());
    closeSettings();
  }
}

async function addCategory() {
  const emoji = document.getElementById('newCatEmoji').value.trim() || '📁';
  const name = document.getElementById('newCatName').value.trim();
  if (!name) { showToast('請輸入分類名稱'); return; }
  const id = 'cat_' + Date.now();
  categories.push({ id, emoji, name });
  await saveMeta();
  document.getElementById('newCatEmoji').value = '';
  document.getElementById('newCatName').value = '';
  renderCatEditList();
  renderFilterChips();
  showToast('✅ 分類已新增');
}

// ── IO ──
function openIo() { document.getElementById('ioOverlay').classList.add('active'); }
function closeIo() { document.getElementById('ioOverlay').classList.remove('active'); }

function exportJson() {
  const data = {
    exportedAt: new Date().toISOString(),
    roomCode,
    categories,
    entries: entries.map(e => ({
      ...e,
      createdAt: e.createdAt ? e.createdAt.toDate().toISOString() : null,
      updatedAt: e.updatedAt ? e.updatedAt.toDate().toISOString() : null,
    })),
  };
  download('MY小百科_備份_' + todayStr() + '.json', JSON.stringify(data, null, 2), 'application/json');
  showToast('📤 JSON 已匯出');
}

function exportCsv() {
  const header = ['標題', '分類', '網址', '筆記', '新增日期'];
  const rows = entries.map(e => {
    const cat = categories.find(c => c.id === e.cat);
    const date = e.createdAt ? new Date(e.createdAt.toDate()).toLocaleDateString('zh-TW') : '';
    return [e.title, cat ? cat.emoji + cat.name : '', e.url || '', (e.note || '').replace(/\n/g,' '), date];
  });
  const csv = [header, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  download('MY小百科_' + todayStr() + '.csv', '\uFEFF' + csv, 'text/csv');
  showToast('📊 CSV 已匯出');
}

async function importJson(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.entries) { showToast('❌ 格式不正確'); return; }
    let count = 0;
    for (const e of data.entries) {
      const { createdAt, updatedAt, id, ...rest } = e;
      const eId = id || 'import_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
      const ref = doc(db, `vault_v1/${roomCode}/entries`, eId);
      await setDoc(ref, { ...rest, createdAt: serverTimestamp(), updatedAt: serverTimestamp() }, { merge: true });
      count++;
    }
    showToast(`✅ 匯入 ${count} 筆`);
    closeIo();
  } catch (err) {
    showToast('❌ 匯入失敗：' + err.message);
  }
  event.target.value = '';
}

function download(filename, content, type) {
  const blob = new Blob([content], { type });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

// ── TOAST ──
function showToast(msg) {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}
window.showToast = showToast;

// ── START ──
init();
</script>
